proxies:
  - name: "dns-out"
    type: dns
  - name: "UDP_IPv4_DIRECT"
    type: direct
    udp: true
    ip-version: ipv4
  - name: "UDP_IPv6_DIRECT"
    type: direct
    udp: true
    ip-version: ipv6
  - name: "TCP_IPv4_DIRECT"
    type: direct
    udp: false
    ip-version: ipv4
  - name: "TCP_IPv6_DIRECT"
    type: direct
    udp: false
    ip-version: ipv6
  - name: "WhiteDNS Template Placeholder"
    type: vless
    server: "127.0.0.1"
    port: 9
    uuid: "00000000-0000-0000-0000-000000000000"
    udp: true
    tls: false
proxy-groups:
