rules:
  # =========================
  # WhiteDNS: Ads / Trackers
  # =========================
  - RULE-SET,BanEasyPrivacy,🧹 WhiteDNS Ads
  - GEOSITE,category-ads-all,🧹 WhiteDNS Ads
  - RULE-SET,ACLBanAD,🧹 WhiteDNS Ads
  - RULE-SET,ACLBanEasyList,🧹 WhiteDNS Ads
  - RULE-SET,BanEasyListChina,🧹 WhiteDNS Ads
  - RULE-SET,IranAds,🧹 WhiteDNS Ads
  - RULE-SET,spotifyads,🧹 WhiteDNS Ads
  - RULE-SET,BanProgramAD,🧹 WhiteDNS Ads
  - RULE-SET,BanAD,🧹 WhiteDNS Ads
  - RULE-SET,PrivateTracker,🧹 WhiteDNS Ads
  - RULE-SET,category_public_tracker,🧹 WhiteDNS Ads
  - RULE-SET,LiteAds,🧹 WhiteDNS Ads
  - RULE-SET,iran_ads,🧹 WhiteDNS Ads
  - RULE-SET,PersianBlocker,🧹 WhiteDNS Ads
  - RULE-SET,ads,🧹 WhiteDNS Ads
  - RULE-SET,BanEasyList,🧹 WhiteDNS Ads
  - RULE-SET,xiaomi-ads,🧹 WhiteDNS Ads
  - RULE-SET,xiaomi_block_list,🧹 WhiteDNS Ads

  # =========================
  # WhiteDNS: Security
  # =========================
  - RULE-SET,malware,🛡️ WhiteDNS Safe
  - RULE-SET,cryptominers,🛡️ WhiteDNS Safe
  - RULE-SET,phishing,🛡️ WhiteDNS Safe
  - RULE-SET,warninglist,🛡️ WhiteDNS Safe
  - RULE-SET,Ponzi,🛡️ WhiteDNS Safe

  # =========================
  # WhiteDNS: LAN / Private
  # =========================
  - GEOSITE,private,🔓 WhiteDNS Direct
  - RULE-SET,C4Uprivate,🔓 WhiteDNS Direct
  - RULE-SET,private,🔓 WhiteDNS Direct
  - RULE-SET,local_ips,🔓 WhiteDNS Direct

  # =========================
  # WhiteDNS: Iran Direct
  # Iranian domains, apps, IPs, ASN/cloud providers
  # =========================
  - GEOSITE,category-ir,🇮🇷 Iran Direct
  - RULE-SET,apps,🇮🇷 Iran Direct
  - RULE-SET,category_ir,🇮🇷 Iran Direct
  - RULE-SET,iran,🇮🇷 Iran Direct
  - RULE-SET,ir,🇮🇷 Iran Direct
  - RULE-SET,ircidr,🇮🇷 Iran Direct
  - RULE-SET,irasn,🇮🇷 Iran Direct
  - RULE-SET,arvancloud,🇮🇷 Iran Direct
  - RULE-SET,derakcloud,🇮🇷 Iran Direct
  - RULE-SET,iranserver,🇮🇷 Iran Direct
  - RULE-SET,parspack,🇮🇷 Iran Direct
  - GEOIP,IR,🇮🇷 Iran Direct

  # =========================
  # WhiteDNS: Google / YouTube
  # =========================
  - PROCESS-NAME,com.google.android.youtube,🚀 WhiteDNS Proxy
