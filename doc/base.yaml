proxy-providers:
  ProviderALL:
    url: https:// 
    type: http
    interval: 600
    proxy: DIRECT
    path: ./proxy_provider/ALL.yaml
  ProviderOpenai:
    url: https:// 
    type: http
    interval: 600
    proxy: DIRECT
    path: ./proxy_provider/Openai.yaml
  ProviderYoutube:
    url: https:// 
    type: http
    interval: 600
    proxy: DIRECT
    path: ./proxy_provider/Youtube.yaml
  ProviderNetflix:
    url: https:// 
    type: http
    proxy: DIRECT
    path: ./proxy_provider/Netflix.yaml
  ProviderDisney:
    url: https:// 
    type: http
    interval: 600
    proxy: DIRECT
    path: ./proxy_provider/Disney.yaml

port: 7890  
socks-port: 7891  
mixed-port: 10801  
redir-port: 7892  
tproxy-port: 7893

allow-lan: true  
bind-address: "*"  

find-process-mode: strict

mode: rule

geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"
geo-auto-update: true  
geo-update-interval: 24  

log-level: silent  

ipv6: false  

external-controller: 0.0.0.0:9090 # 
external-controller-tls: 0.0.0.0:9443  
external-controller-unix: mihomo.sock

external-controller-pipe: \\.\pipe\mihomo


external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"


external-doh-server: /dns-query
global-client-fingerprint: chrome

hosts:
  'mb3admin.com': 192.168.31.10
# '*.mihomo.dev': 127.0.0.1
# '.dev': 127.0.0.1
# 'alpha.mihomo.dev': '::1'
# test.com: [1.1.1.1, 2.2.2.2]
# home.lan: lan # lan is a special field; addresses from all local network interfaces are added
# baidu.com: google.com # only one alias can be configured

profile:
  store-selected: false
  store-fake-ip: true

### Domain Sniffing
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: system
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  device: mihomo
  mtu: 9000
  strict-route: false
  gso: true
  gso-max-size: 65536
  udp-timeout: 300
  iproute2-table-index: 2022
  iproute2-rule-index: 9000
  endpoint-independent-nat: false
  route-exclude-address:
  - 172.16.0.0/12
  - fc00::/7
 
dns:
    enable: true
    listen: 0.0.0.0:53
    ipv6: false
    default-nameserver: [223.5.5.5, 119.29.29.29]
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    use-hosts: true
    nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
    url-test: ['https://doh.dns.sb/dns-query', 'https://dns.cloudflare.com/dns-query', 'https://dns.twnic.tw/dns-query', 'tls://8.8.4.4:853']
    url-test-filter: { geoip: true, ipcidr: [240.0.0.0/4, 0.0.0.0/32] }


